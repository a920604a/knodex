server {
    listen 80;
    server_name _;

    # 靜態前端（SPA fallback）
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy → FastAPI backend
    # Browser page navigation (Accept: text/html) falls through to SPA fallback above.
    # Only proxy when the client expects JSON / non-HTML (i.e. actual API calls).
    location ~ ^/(documents|highlights|tags|search|health|auth|query|document-tags|admin) {
        if ($http_accept ~* "text/html") {
            rewrite ^ /index.html last;
        }
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        client_max_body_size 100m;
    }

    # 靜態資源快取
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
