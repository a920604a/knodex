services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: knodex
      POSTGRES_PASSWORD: knodex
      POSTGRES_DB: knodex
    ports:
      - "15432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knodex"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://knodex:knodex@db:5432/knodex
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-ebook}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SECRET_KEY: ${SECRET_KEY:-changeme-use-a-long-random-string-in-production}
      CF_ACCOUNT_ID: ${CF_ACCOUNT_ID:-}
      CF_API_TOKEN: ${CF_API_TOKEN:-}
      CF_VECTORIZE_INDEX_NAME: ${CF_VECTORIZE_INDEX_NAME:-knodex-chunks}
      FIREBASE_CREDENTIALS_JSON: ${FIREBASE_CREDENTIALS_JSON:-}
    ports:
      - "18000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://knodex:knodex@db:5432/knodex
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-ebook}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CF_ACCOUNT_ID: ${CF_ACCOUNT_ID:-}
      CF_API_TOKEN: ${CF_API_TOKEN:-}
      CF_VECTORIZE_INDEX_NAME: ${CF_VECTORIZE_INDEX_NAME:-knodex-chunks}
      FIREBASE_CREDENTIALS_JSON: ${FIREBASE_CREDENTIALS_JSON:-}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uv run python -m worker.main

  nginx:
    image: nginx:alpine
    ports:
      - "18080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend

  # 開發模式（make dev-up 啟動）
  frontend-dev:
    profiles: ["dev"]
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ""
      BACKEND_URL: http://backend:8000
      VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
      VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-}
      VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
      VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
